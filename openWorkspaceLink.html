<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://imanage.ludvig.se/js/imanageApi.js"></script>
</head>
<body>
<script>
(function () {
  'use strict';

  var LINK_FIELD = 'custom12';

  window.addEventListener('load', function () {

    imanage.ready().then(function (context) {

      var item = context.selectedItems[0];

      // Debug — check what fields are available
      console.log('[iManage] Selected item:', item);
      console.table(item);

      var matter = item[LINK_FIELD];

      if (!matter || !matter.trim()) {
        console.warn('[iManage] Field "' + LINK_FIELD + '" is empty or missing');
        imanage.cancel();
        return;
      }

      var url = "https://app.arkivia.se?matter=" + encodeURIComponent(matter.trim());
      console.log('[iManage] Redirecting to:', url);

      window.top.location.href = url;

    }).catch(function (err) {
      console.error('[iManage] imanage.ready() failed:', err);
      imanage.cancel();
    });

  });

}());
</script>
</body>
</html>
